<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>对话</title>
  <style>
    * { margin:0; padding:0; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 12px;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      font-size: 13px;
      color: #333;
      padding: 8px;
      background: white;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    #inputArea {
      display: flex;
      gap: 8px;
    }
    #inputArea input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    #inputArea button {
      padding: 8px 14px;
      background: #4a9eff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="messages">对话开始...</div>
  <div id="inputArea">
    <input type="text" id="msgInput" placeholder="输入消息...">
    <button id="sendBtn">发送</button>
  </div>

  <script>
    const { ipcRenderer } = window.require("electron");
    const messages = document.getElementById("messages");
    const msgInput = document.getElementById("msgInput");
    const sendBtn = document.getElementById("sendBtn");

    // 从 localStorage 读取 API 配置（由主进程传入）
    let apiConfig = { model: "", url: "", key: "" };

    ipcRenderer.on("api-config", (event, config) => {
      apiConfig = config || { model: "deepseek-chat", url: "https://api.deepseek.com/v1/chat/completions", key: "" };
      if (apiConfig.key === "") {
        addMessage("⚠️ 请先在控制面板配置 API Key", false);
        sendBtn.disabled = true;
      }
    });

    // 调用 AI API
    async function callAI(userMessage) {
      const requestBody = {
        model: apiConfig.model,
        messages: [{ role: "user", content: userMessage }]
      };

      const response = await fetch(apiConfig.url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + apiConfig.key
        },
        body: JSON.stringify(requestBody)
      });

      const data = await response.json();
      return data.choices[0].message.content;
    }

    function addMessage(text, isUser = false) {
      const div = document.createElement("div");
      div.style.cssText = `
        margin-bottom: 8px;
        padding: 8px 10px;
        border-radius: 8px;
        max-width: 80%;
        ${isUser
          ? "background: #4a9eff; color: white; margin-left: auto; text-align: right;"
          : "background: #eee; color: #333;"}
      `;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    sendBtn.addEventListener("click", async () => {
      const text = msgInput.value.trim();
      if (!text) return;
      addMessage(text, true);
      msgInput.value = "";

      // 调用 AI，拿到回复后显示
      try {
        const aiReply = await callAI(text);
        addMessage(aiReply, false);
      } catch (err) {
        addMessage("❌ 调用失败：" + err.message, false);
      }
    });

    msgInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendBtn.click();
    });
  </script>
</body>
</html>
